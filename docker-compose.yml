services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - db
    volumes:
      - upload_data:/app/uploads/files
  db:
    image: postgres:18.3-bookworm
    restart: always
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: jobportal
      POSTGRES_USER: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - "9090:8080"

volumes:
  postgres_data:
  upload_data:
    driver: local